name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      # Cache Gradle + the RN/Android build dirs so subsequent builds drop from
      # ~40 min to ~10-15 min. First run after this populates the cache.
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-v1
          restore-keys: gradle-${{ runner.os }}-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: nodemods-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: nodemods-${{ runner.os }}-

      - name: Install JS dependencies
        working-directory: frontend
        run: npm install

      - name: Expo prebuild (generate android/)
        working-directory: frontend
        run: npx expo prebuild --platform android --no-install --non-interactive

      - name: Ensure release uses the committed (stable) debug keystore
        working-directory: frontend/android
        run: |
          # Expo prebuild wires release → signingConfigs.debug by default. Copy the
          # repo's COMMITTED debug keystore into place so every build is signed with
          # the SAME key. That lets new APKs install over the top (adb install -r /
          # tapping the new release) WITHOUT wiping app data — so saved API keys,
          # chats and settings survive updates. (A debug keystore is not a secret;
          # the password is the well-known "android".)
          cp ../ci-debug.keystore app/debug.keystore
          echo "Signing key fingerprint:"
          keytool -list -v -keystore app/debug.keystore -storepass android -alias androiddebugkey | grep -E "SHA1|SHA256" || true
          echo "--- relevant snippet of app/build.gradle ---"
          grep -nE "signingConfig|buildTypes|release" app/build.gradle | head -40

      - name: Gradle assembleRelease (bundles JS into APK)
        working-directory: frontend/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Locate + name APKs
        run: |
          # Release APK location can be apk/release/app-release.apk or split per-ABI.
          SRC=$(find frontend/android/app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "Source APK: $SRC"
          # Versioned copy (history) + stable copy (permanent "latest" download link).
          VERSIONED=colour-ceauxdid-${{ github.run_number }}-release.apk
          STABLE=colour-ceauxdid.apk
          cp "$SRC" "$VERSIONED"
          cp "$SRC" "$STABLE"
          echo "APK_VERSIONED=$VERSIONED" >> $GITHUB_ENV
          echo "APK_STABLE=$STABLE" >> $GITHUB_ENV
          # Sanity: verify the JS bundle is embedded so the APK runs standalone.
          unzip -l "$STABLE" | grep -E "assets/index.android.bundle" || (echo "❌ JS bundle missing from APK"; exit 1)
          ls -lh "$VERSIONED" "$STABLE"

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: colour-ceauxdid-apk
          path: ${{ env.APK_STABLE }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-build-${{ github.run_number }}
          name: APK Build ${{ github.run_number }}
          body: |
            Standalone release APK from commit ${{ github.sha }}.
            JS bundle is embedded — no Metro / dev server needed.

            Permanent download link (always the newest build):
            https://github.com/${{ github.repository }}/releases/latest/download/colour-ceauxdid.apk

            Install on phone:
            1. Open this page on your phone
            2. Tap the .apk asset below
            3. Allow install-from-this-source if prompted
          files: |
            ${{ env.APK_STABLE }}
            ${{ env.APK_VERSIONED }}
